<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分抽奖系统</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body {background:#222;color:#fff;padding:20px;font-size:16px;}
        button {
            min-height:36px !important;
            pointer-events:auto !important;
            cursor:pointer !important;
            transform:translateZ(0) !important;
            will-change:transform !important;
            touch-action:manipulation !important;
            transition: all 0.2s ease;
        }
        button:disabled {
            opacity: 0.4 !important;
            cursor: not-allowed !important;
            transform: none !important;
        }
        @keyframes shake {
            0%,100% {transform: translateX(0);}
            20% {transform: translateX(-8px) rotate(-2deg);}
            40% {transform: translateX(8px) rotate(2deg);}
            60% {transform: translateX(-6px) rotate(-1deg);}
            80% {transform: translateX(6px) rotate(1deg);}
        }
        @keyframes cardShow {
            0% {opacity:0; transform: scale(0.6) translateY(20px);}
            100% {opacity:1; transform: scale(1) translateY(0);}
        }
        @keyframes goldFlash {
            0%,100% {filter: brightness(1);}
            50% {filter: brightness(1.6);}
        }
        @keyframes modalPop {
            0% {opacity:0; transform: scale(0.7);}
            100% {opacity:1; transform: scale(1);}
        }
        .shake-animate {animation: shake 0.8s ease-in-out;}
        .card-animate {animation: cardShow 0.5s ease-out forwards;}
        .gold-flash {animation: goldFlash 0.4s ease infinite;}
        .modal-box {animation: modalPop 0.3s ease-out;}
        .warn-text {color: #ff4d4f;font-weight: bold;}
        .success-text {color: #28c76f;font-weight: bold;}
        .task-panel {background:#444;padding:16px;border-radius:12px;margin-bottom:30px;}
        .task-item {display:flex;align-items:center;gap:12px;margin:16px 0;flex-wrap:wrap;justify-content:space-between;padding:10px;background:#3a3a3a;border-radius:8px;}
        .task-desc {font-size:16px;}
        .task-count {color:#ffd700;margin:4px 0;}
        .btn-get {background:#28c76f;color:#000;border:none;padding:6px 14px;border-radius:4px;font-size:15px;}
        .btn-get:disabled {background:#666;color:#aaa;cursor:not-allowed !important;}
        .guarantee-panel {background:#303030;padding:14px;border-radius:10px;margin-bottom:20px;color:#ffd700;text-align:center;line-height:1.6;}
        .main-card {text-align:center;}
        .resource-box {background:#ff7d00;border-radius:16px;padding:20px;font-size:22px;margin-bottom:20px;}
        .change-cost-btn {margin-top:10px;padding:8px 14px;border:none;border-radius:6px;font-size:16px;}
        .pool-title {font-size:28px;color:#ffd700;margin:20px 0;word-break:break-all;}
        .rate-text {font-size:20px;color:#ffd700;line-height:1.8;margin-bottom:10px;}
        .draw-wrap {margin:30px 0;display:flex;gap:20px;justify-content:center;}
        .draw-btn {padding:12px 24px;font-size:18px;border:none;border-radius:8px;background:#ffd700;color:#000;font-weight:bold;}
        .card-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-top:20px;}
        .gacha-card {height:140px;background:#555;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;opacity:0;word-wrap:break-word;padding:6px;}
        .record-panel {background:#333;padding:16px;border-radius:12px;margin-top:30px;max-height:320px;overflow-y:auto;}
        .record-top {display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
        .record-title {font-size:20px;color:#ffd700;}
        .clear-record-btn {background:#ff4d4f;border:none;padding:4px 10px;border-radius:4px;color:#fff;}
        .record-item {padding:8px 0;border-bottom:1px solid #444;font-size:14px;line-height:1.5;}
        .record-empty {color:#999;text-align:center;padding:20px;}
        .mask {position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99999;display:none;align-items:center;justify-content:center;}
        .modal-box {background:#333;padding:30px;border-radius:12px;min-width:300px;text-align:center;}
        .modal-close {margin-top:20px;padding:8px 20px;border:none;border-radius:6px;background:#ffd700;color:#000;font-weight:bold;}
    </style>
</head>
<body>
    <div class="task-panel">
        <h3>每日任务领取积分</h3>
        <div id="taskList"></div>
    </div>
    <div class="guarantee-panel">
        <div id="guaranteeTip"></div>
    </div>
    <div class="main-card">
        <div class="resource-box">
            <div>当前积分：<span id="jadeNum" class="gold-flash">0</span></div>
            <div>单次寻访消耗：<span id="costNum">100</span>积分</div>
            <button class="change-cost-btn" id="editCostBtn">修改消耗</button>
        </div>
        <div class="pool-title">抽奖池</div>
        <div class="rate-text">
            <div>30元红包：2% ｜ 10元红包：18% ｜ 未中奖：80%</div>
            <div>保底规则：10抽内必出10元，50抽必出30元</div>
        </div>
        <div class="draw-wrap" id="drawWrapBox">
            <button class="draw-btn" id="drawOnce">单抽</button>
            <button class="draw-btn" id="drawTen">十连</button>
        </div>
        <div class="card-grid" id="cardContainer"></div>
    </div>
    <div class="record-panel">
        <div class="record-top">
            <div class="record-title">抽卡记录</div>
            <button class="clear-record-btn" id="clearRecordBtn">清空记录</button>
        </div>
        <div id="recordList" class="record-empty">暂无抽卡记录</div>
    </div>
    <div class="mask" id="rewardMask">
        <div class="modal-box">
            <h3>本次抽奖结果</h3>
            <div id="rewardContent"></div>
            <button class="modal-close" id="closeRewardModal">确认收下</button>
        </div>
    </div>
    <div class="mask" id="costMask">
        <div class="modal-box">
            <h3>设置单次抽奖消耗积分</h3>
            <input type="number" id="inputCost" min="1" value="100">
            <div style="margin-top:16px;display:flex;gap:10px;justify-content:center;">
                <button class="modal-close" id="cancelCost">取消</button>
                <button class="modal-close" id="saveCost">保存</button>
            </div>
        </div>
    </div>

<script>
const timerManager = {
    timerList: [],
    setTimer(fn, delay) {const t=setTimeout(fn,delay);this.timerList.push(t);return t;},
    clearAll() {this.timerList.forEach(clearTimeout);this.timerList=[];}
}
let audioCtx = null;
function initAudio(){if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();}
function safeHtmlFilter(str) {return String(str||'').replace(/[<>"']/g, c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function getValidNumber(val, min=0, max=9999) {let n=parseInt(val);return isNaN(n)?min:Math.max(min,Math.min(n,max));}
function safeRun(fn, tip="操作失败"){
    try{return fn();}catch(e){
        console.error(e);
        alert(`${tip}：${e.message}`);
        isDrawing=false;
        timerManager.clearAll();
        document.getElementById('drawOnce').disabled=false;
        document.getElementById('drawTen').disabled=false;
        renderAll();
    }
}
function getTodayStr(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function formatTime(){const now=new Date();return `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;}
function playTone(type){initAudio();try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=type==='draw'?320:type==='success'?580:160;g.gain.value=0.15;o.start();o.stop(audioCtx.currentTime+0.22);}catch(e){}}
const fixedPrizeList=[{name:"30元",rate:2,level:3},{name:"10元",rate:18,level:2},{name:"未中奖",rate:80,level:1}];
const fixedTaskConfig=[{id:1,name:"读书",maxDay:3,reward:30},{id:2,name:"完成作业",maxDay:1,reward:100},{id:3,name:"完成学习",maxDay:4,reward:30}];
// ✅ 初始积分改为 0
const defaultData={jade:0,drawCost:100,taskRecord:{today:"",list:{}},guarantee:{totalDraw:0,smallGuarantee:0,lastThirty:0},drawRecords:[]};
let storeData;
try{
    localStorage.removeItem('lotteryData');
    storeData={...defaultData};
    saveStorage();
}catch(err){
    storeData={...defaultData};
    saveStorage();
}
let isDrawing=false;
function saveStorage(){
    try{
        localStorage.setItem('lotteryData',JSON.stringify(storeData));
    }catch(e){
        console.warn("存储失败",e);
    }
}
function renderAll(){
    resetTaskCountIfNewDay();
    renderTaskList();
    renderGuaranteeTip();
    renderRecordList();
    updateResourceText();
}
function updateResourceText(){
    document.getElementById('jadeNum').textContent=storeData.jade;
    document.getElementById('costNum').textContent=storeData.drawCost;
    document.getElementById('inputCost').value=storeData.drawCost;
}
function resetTaskCountIfNewDay(){
    const today=getTodayStr();
    if(storeData.taskRecord.today!==today){
        storeData.taskRecord.today=today;
        storeData.taskRecord.list={};
        fixedTaskConfig.forEach(i=>storeData.taskRecord.list[i.id]=0);
        saveStorage();
    }
}
function renderTaskList(){
    const wrap=document.getElementById('taskList');
    wrap.innerHTML='';
    fixedTaskConfig.forEach(t=>{
        const u=storeData.taskRecord.list[t.id]||0;
        const c=document.createElement('div');
        c.className='task-item';
        c.innerHTML=`<div class="task-desc-box"><div class="task-desc">${t.name}，单次奖励${t.reward}积分</div><div class="task-count">今日已领取：${u}/${t.maxDay}</div></div><button class="btn-get" data-taskid="${t.id}" ${u<t.maxDay?'':'disabled'}>领取积分</button>`;
        wrap.appendChild(c);
    });
}
function renderGuaranteeTip(){
    const g=storeData.guarantee;
    const t30=50-(g.totalDraw-g.lastThirty);
    const t10=10-g.smallGuarantee;
    document.getElementById('guaranteeTip').innerHTML=`累计总抽：${g.totalDraw} ｜ 距离30元保底剩余${t30}抽 ｜ 距离10元小保底剩余${t10}抽`;
}
function renderRecordList(){
    const wrap=document.getElementById('recordList');
    const records=storeData.drawRecords||[];
    if(records.length===0){
        wrap.innerHTML=`<div class="record-empty">暂无抽卡记录</div>`;
        return;
    }
    let html='';
    [...records].reverse().forEach(item=>{
        const time=safeHtmlFilter(item.time||'未知时间');
        const type=safeHtmlFilter(item.type||'未知类型');
        const result=item.result?.map(r=>safeHtmlFilter(r)).join('、')||'无结果';
        html+=`<div class="record-item"><div>${time} · ${type}</div><div>结果：${result}</div></div>`;
    });
    wrap.innerHTML=html;
}
function singleDrawPrize(){
    const g=storeData.guarantee;
    const d=g.totalDraw-g.lastThirty;
    if(d>=50)return fixedPrizeList[0];
    if(g.smallGuarantee>=10)return fixedPrizeList[1];
    let r=Math.random()*100,t=0;
    for(let p of fixedPrizeList){
        t+=p.rate;
        if(r<=t)return p;
    }
    return fixedPrizeList[2];
}
function updateGuaranteeCount(p){
    const g=storeData.guarantee;
    g.totalDraw++;
    if(p.name==="30元"){
        g.lastThirty=g.totalDraw;
        g.smallGuarantee=0;
    }else if(p.name==="10元"){
        g.smallGuarantee=0;
    }else{
        g.smallGuarantee++;
    }
}
function addDrawRecord(type,prizes){
    if(!storeData.drawRecords)storeData.drawRecords=[];
    const record={
        time:formatTime(),
        type:type,
        result:prizes.map(p=>p.name)
    };
    storeData.drawRecords.push(record);
    if(storeData.drawRecords.length>100)storeData.drawRecords.shift();
    saveStorage();
    renderRecordList();
}
function bindClick(el,h){if(el){el.addEventListener('click',h);el.addEventListener('pointerdown',h);}}
function closeMask(id){document.getElementById(id).style.display='none';}
function bindEvents(){
    document.body.addEventListener('click',initAudio,{once:true});
    document.getElementById('taskList').onclick=e=>{
        const t=Number(e.target.dataset.taskid);
        if(isNaN(t))return;
        safeRun(()=>{
            const task=fixedTaskConfig.find(i=>i.id===t);
            const u=storeData.taskRecord.list[t]||0;
            if(u>=task.maxDay){
                playTone('fail');
                alert("今日领取次数已用尽！");
                return;
            }
            storeData.jade+=task.reward;
            storeData.taskRecord.list[t]=u+1;
            playTone('success');
            saveStorage();
            renderAll();
            alert(`领取成功，获得${task.reward}积分！`);
        },"领取失败");
    };
    bindClick(document.getElementById('clearRecordBtn'),()=>{
        safeRun(()=>{
            storeData.drawRecords=[];
            saveStorage();
            renderRecordList();
            alert("已清空记录");
        });
    });
    function clearCards(){
        timerManager.clearAll();
        document.getElementById('cardContainer').innerHTML='';
    }
    function makeCard(i,d){
        const c=document.createElement('div');
        c.className='gacha-card';
        c.style.animationDelay=d+'ms';
        c.classList.add('card-animate');
        c.textContent=safeHtmlFilter(i.name);
        return c;
    }
    function showReward(l){
        let h='';
        l.forEach(i=>h+=`<p style="margin:8px 0;font-size:18px;">${safeHtmlFilter(i.name)}</p>`);
        document.getElementById('rewardContent').innerHTML=h;
        document.getElementById('rewardMask').style.display='flex';
    }
    bindClick(document.getElementById('drawOnce'),()=>{
        safeRun(()=>{
            if(isDrawing)return;
            const cost=storeData.drawCost;
            if(storeData.jade<cost){
                playTone('fail');
                document.getElementById('jadeNum').className='warn-text';
                setTimeout(()=>document.getElementById('jadeNum').className='gold-flash',1000);
                alert("积分不足！");
                return;
            }
            isDrawing=true;
            document.getElementById('drawOnce').disabled=true;
            document.getElementById('drawTen').disabled=true;
            const wrap=document.getElementById('drawWrapBox');
            wrap.classList.add('shake-animate');
            playTone('draw');
            clearCards();
            storeData.jade-=cost;
            const prize=singleDrawPrize();
            updateGuaranteeCount(prize);
            addDrawRecord("单抽",[prize]);
            saveStorage();
            renderGuaranteeTip();
            updateResourceText();
            document.getElementById('cardContainer').appendChild(makeCard(prize,0));
            timerManager.setTimer(()=>{
                playTone('success');
                showReward([prize]);
                wrap.classList.remove('shake-animate');
                isDrawing=false;
                document.getElementById('drawOnce').disabled=false;
                document.getElementById('drawTen').disabled=false;
            },1200);
        },"单抽失败");
    });
    bindClick(document.getElementById('drawTen'),()=>{
        safeRun(()=>{
            if(isDrawing)return;
            const cost=storeData.drawCost*10;
            if(storeData.jade<cost){
                playTone('fail');
                document.getElementById('jadeNum').className='warn-text';
                setTimeout(()=>document.getElementById('jadeNum').className='gold-flash',1000);
                alert("积分不足！");
                return;
            }
            isDrawing=true;
            document.getElementById('drawOnce').disabled=true;
            document.getElementById('drawTen').disabled=true;
            const wrap=document.getElementById('drawWrapBox');
            wrap.classList.add('shake-animate');
            playTone('draw');
            clearCards();
            storeData.jade-=cost;
            const cont=document.getElementById('cardContainer');
            const list=[];
            for(let i=0;i<10;i++){
                const p=singleDrawPrize();
                list.push(p);
                updateGuaranteeCount(p);
                cont.appendChild(makeCard(p,i*80));
            }
            addDrawRecord("十连",list);
            saveStorage();
            renderGuaranteeTip();
            updateResourceText();
            timerManager.setTimer(()=>{
                playTone('success');
                showReward(list);
                wrap.classList.remove('shake-animate');
                isDrawing=false;
                document.getElementById('drawOnce').disabled=false;
                document.getElementById('drawTen').disabled=false;
            },1500);
        },"十连失败");
    });
    bindClick(document.getElementById('closeRewardModal'),()=>closeMask('rewardMask'));
    bindClick(document.getElementById('editCostBtn'),()=>document.getElementById('costMask').style.display='flex');
    bindClick(document.getElementById('cancelCost'),()=>closeMask('costMask'));
    bindClick(document.getElementById('saveCost'),()=>{
        safeRun(()=>{
            storeData.drawCost=getValidNumber(document.getElementById('inputCost').value,1,999);
            saveStorage();
            updateResourceText();
            closeMask('costMask');
        },"修改失败");
    });
    document.querySelectorAll('.mask').forEach(m=>m.addEventListener('click',e=>{
        if(e.target===m)m.style.display='none';
    }));
}
window.addEventListener('DOMContentLoaded',()=>{
    renderAll();
    bindEvents();
});
</script>
</body>
</html>
